<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ff8c00" />
    <meta
      name="description"
      content="Yes Man — a warm, funny idle game about saying yes. No timers, no FOMO, full offline progress. Collect stamps, find secrets, spread Cheer."
    />
    <title>Yes Man — A Feel-Good Idle Game</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #fff8dc;
        overflow: hidden;
        /* Avoid mobile tap highlight / text selection during rapid clicking. */
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
        touch-action: manipulation;
      }
      #game {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
