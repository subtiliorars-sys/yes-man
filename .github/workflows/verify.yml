name: verify

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "automation/**"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run verify

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: yes-man-playtest-site
          path: dist
